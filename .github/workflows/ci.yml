name: test

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/ci.yml
      - src/**
      - test/**
  pull_request:
    branches: [ main ]
    paths:
      - .github/workflows/ci.yml
      - src/**
      - test/**
  workflow_dispatch:

jobs:
  linux-x86_64-build-bootstrap:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: fetch mlir
      run: |
          python3 scripts/download_llvm.py
    - name: build
      run: |
          mkdir build
          cd build
          cmake .. -DENABLE_MLIR=on
          make -j4
    - name: test
      run: |
          python3 scripts/test.py
