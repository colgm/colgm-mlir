name: test

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/ci.yml
      - src/**
      - test/**
  pull_request:
    branches: [ main ]
    paths:
      - .github/workflows/ci.yml
      - src/**
      - test/**
  workflow_dispatch:

jobs:
  linux-x86_64-build-bootstrap:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: fetch mlir
      run: |
          apt-get install -y zstd
          python3 scripts/download_llvm.py --github
    - name: build
      run: |
          python3 scripts/build.py
    - name: test
      run: |
          python3 scripts/test.py
